services:
  ocr-lab-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    networks:
      - ocr-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3001/api/health'); const j = await r.json(); if(!r.ok || !j.workerReady) process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G

  ocr-lab-frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - PORT=3000
    depends_on:
      ocr-lab-server:
        condition: service_healthy
    networks:
      - ocr-net
    restart: unless-stopped

networks:
  ocr-net:
    driver: bridge
